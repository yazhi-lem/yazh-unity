name: Yazh-Unity CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_models:
        description: 'Bundle ONNX models into the APK (default: model-less build)'
        required: false
        default: false
        type: boolean
      build_ios:
        description: 'Also export iOS Xcode project'
        required: false
        default: false
        type: boolean

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Validate project structure (fast, no Unity)
  # ──────────────────────────────────────────────
  validate:
    name: 'Validate Project'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "=== Project Structure Validation ==="
          fail=0
          for f in \
            ProjectSettings/ProjectVersion.txt \
            ProjectSettings/EditorBuildSettings.asset \
            Packages/manifest.json \
            Assets/Scripts/Core/GameManager.cs \
            Assets/Scripts/Editor/BuildScript.cs \
            Assets/Scripts/Runner/RunnerBootstrap.cs \
            Assets/Scenes/MainMenu.unity \
            Assets/Scenes/PetSelection.unity \
            Assets/Scenes/TinaiRunner.unity \
            docs/deployment/build-yazh.sh
          do
            if [ -f "$f" ]; then echo "OK  $f"; else echo "MISSING  $f"; fail=1; fi
          done
          # Models are OPTIONAL — the build and the app work without them.
          for m in Assets/StreamingAssets/MLModels/yazh-30k*.onnx; do
            [ -f "$m" ] && echo "OK  (optional) $m" || echo "absent (optional) $m"
          done
          exit $fail

      - name: Check meta/GUID wiring
        run: |
          echo "=== Meta/GUID Wiring ==="
          fail=0
          # Every asset must have a .meta, every .meta a matching asset.
          while read -r f; do
            [ -f "$f.meta" ] || { echo "MISSING META  $f"; fail=1; }
          done < <(find Assets -type f ! -name "*.meta")
          while read -r m; do
            [ -e "${m%.meta}" ] || { echo "ORPHAN META  $m"; fail=1; }
          done < <(find Assets -name "*.meta")
          exit $fail

  # ──────────────────────────────────────────────
  # Job 2: Build Android APK (real build — needs Unity license secrets)
  # ──────────────────────────────────────────────
  build-android:
    name: 'Build Android APK'
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Check Unity license secrets
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if [ -z "$UNITY_LICENSE" ] && { [ -z "$UNITY_EMAIL" ] || [ -z "$UNITY_PASSWORD" ]; }; then
            echo "::error::Unity license secrets missing. Add UNITY_LICENSE (contents of your .ulf) plus UNITY_EMAIL and UNITY_PASSWORD as repository secrets."
            echo "::error::Setup guide: docs/deployment/CI_SETUP.md (activation workflow: .github/workflows/activation.yml)"
            exit 1
          fi
          echo "License secrets present."

      - name: Strip ML models (model-less build)
        if: github.event_name != 'workflow_dispatch' || inputs.include_models != true
        run: |
          echo "Building WITHOUT bundled models — app uses scripted Tamil fallback."
          rm -f Assets/StreamingAssets/MLModels/*.onnx \
                Assets/StreamingAssets/MLModels/*.onnx.meta \
                Assets/StreamingAssets/MLModels/*.sentis \
                Assets/StreamingAssets/MLModels/*.sentis.meta
          ls -la Assets/StreamingAssets/MLModels/

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: Android
          buildMethod: BuildScript.BuildAndroidCI
          buildName: Yazh-Android
          buildsPath: Build
          androidExportType: androidPackage

      - name: List build output
        run: ls -lhR Build/ || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yazh-Android-APK
          path: Build/**/*.apk
          if-no-files-found: error
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 3: iOS Xcode export (manual only)
  # ──────────────────────────────────────────────
  build-ios:
    name: 'Build iOS (Xcode project)'
    needs: validate
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_ios == true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-iOS-

      - name: Build iOS Xcode project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: iOS
          buildName: Yazh-iOS
          buildsPath: Build

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yazh-iOS-Xcode
          path: Build/iOS/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 4: Summary
  # ──────────────────────────────────────────────
  summary:
    name: 'Build Summary'
    needs: [validate, build-android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build summary
        run: |
          echo "═══════════════════════════════════════"
          echo "  YAZH-UNITY CI/CD BUILD SUMMARY"
          echo "═══════════════════════════════════════"
          echo "  Validate:  ${{ needs.validate.result }}"
          echo "  Android:   ${{ needs.build-android.result }}"
          echo "  Commit:    ${{ github.sha }}"
          echo "  Branch:    ${{ github.ref_name }}"
          echo "═══════════════════════════════════════"
